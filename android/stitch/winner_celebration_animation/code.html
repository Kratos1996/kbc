  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }

  }

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
varying vec2 v_texCoord;

void main() {
    vec2 uv = v_texCoord;
    vec3 gold = vec3(1.0, 0.8, 0.2);
    vec3 white = vec3(1.0, 1.0, 1.0);
    
    // Centered radial burst
    vec2 center = vec2(0.5);
    float d = distance(uv, center);
    
    // Particle streaks
    float angle = atan(uv.y - 0.5, uv.x - 0.5);
    float streak = sin(angle * 20.0 + u_time * 10.0) * 0.5 + 0.5;
    streak *= pow(1.0 - d, 2.0);
    
    // Pulse
    float pulse = sin(u_time * 5.0) * 0.1 + 0.9;
    float circle = smoothstep(0.3 * pulse, 0.28 * pulse, d);
    
    vec3 color = mix(gold, white, streak) * (streak + circle);
    
    gl_FragColor = vec4(color, color.r > 0.1 ? 1.0 : 0.0);

    gl.shaderSource(s, src);
    gl.compileShader(s);

      const ny = 1.0 - (event.clientY - rect.top) / rect.height;

      mouse.y = ny * canvas.height;

light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    trophy.rotation.x += 0.01;
    trophy.rotation.y += 0.01;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();

                confetti.style.animationDuration = (Math.random() * 2 + 3) + 's';
                confetti.style.animationDelay = (Math.random() * 5) + 's';
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 15 + 5) + 'px';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetti);
            }
        }

        // Initialize effects
        window.addEventListener('DOMContentLoaded', () => {
            createConfetti();
            
            // Add subtle mouse movement parallax to the trophy
            document.addEventListener('mousemove', (e) => {
                const trophy = document.querySelector('threejs-scene');
                if (trophy) {
                    const x = (window.innerWidth / 2 - e.pageX) / 50;
                    const y = (window.innerHeight / 2 - e.pageY) / 50;
                    trophy.style.transform = `translate(${x}px, ${y}px)`;
                }
            });
        });
