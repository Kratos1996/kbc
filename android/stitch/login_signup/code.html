<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = [document.getElementById('login-tab'), document.getElementById('signup-tab')];
            const submitBtnText = document.querySelector('button[type="submit"] span:first-child');
            const authForm = document.getElementById('auth-form');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => {
                        t.classList.remove('text-secondary', 'border-b-2', 'border-secondary-fixed');
                        t.classList.add('text-on-surface-variant/60');
                    });
                    tab.classList.add('text-secondary', 'border-b-2', 'border-secondary-fixed');
                    tab.classList.remove('text-on-surface-variant/60');
                    
                    if(tab.id === 'signup-tab') {
                        submitBtnText.textContent = 'JOIN THE ARENA';
                    } else {
                        submitBtnText.textContent = 'ENTER ARENA';
                    }
                });
            });

            // Prevent default form behavior for demo
            authForm.addEventListener('submit', (e) => {
                e.preventDefault();
                // Simulation of "Hot" state transition
                const btn = e.target.querySelector('button[type="submit"]');
                btn.style.filter = 'brightness(1.5) drop-shadow(0 0 20px #ffe16d)';
                setTimeout(() => {
                    btn.style.filter = '';
                }, 500);
            });
        });
    </script>
