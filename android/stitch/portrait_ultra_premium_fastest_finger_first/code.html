<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fastest Finger First - Radiance Arena</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&amp;family=JetBrains+Mono:wght@500&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        
        body {
            background: radial-gradient(circle at 50% 50%, #1e104d 0%, #050505 100%);
            min-height: max(884px, 100dvh);
            position: relative;
            overflow-x: hidden;
        }

        /* God Rays / Studio Spotlights */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 50% -20%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 120%, rgba(112, 0, 255, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Glowing Floor Pattern */
        .studio-floor {
            position: fixed;
            bottom: -10%;
            left: 50%;
            transform: translateX(-50%) rotateX(70deg);
            width: 200%;
            height: 100%;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Sharp Elongated Hexagon */
        .kbc-hexagon {
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
            background: linear-gradient(180deg, rgba(40, 20, 100, 0.8) 0%, rgba(10, 5, 30, 0.95) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dual Layered Border: Inner Blue Glow, Outer Polished Gold */
        .kbc-hexagon-border {
            position: relative;
            padding: 3px; /* Outer Gold thickness */
            background: linear-gradient(135deg, #e9c400 0%, #ffe16d 45%, #8b6e00 55%, #e9c400 100%);
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .kbc-hexagon-inner-glow {
            position: absolute;
            inset: 4px; /* Space for the inner blue glow */
            background: transparent;
            border: 1px solid rgba(114, 18, 255, 0.8);
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
            pointer-events: none;
            box-shadow: inset 0 0 15px rgba(114, 18, 255, 0.5);
            z-index: 2;
        }

        /* Texture Overlay */
        .kbc-texture {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm1 1h38v38H1V1z' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        .selected-card .kbc-hexagon {
            background: linear-gradient(180deg, #ffe16d 0%, #e9c400 100%) !important;
        }
        
        .selected-card p, .selected-card span {
            color: #221b00 !important;
            text-shadow: none !important;
        }

        .premium-clock {
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border: 2px solid #e9c400;
            box-shadow: 0 0 25px rgba(233, 196, 0, 0.2), inset 0 0 15px rgba(233, 196, 0, 0.1);
        }

        .active-prize-glow {
            box-shadow: 0 0 20px rgba(209, 188, 255, 0.3);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 15px rgba(209, 188, 255, 0.2); }
            to { box-shadow: 0 0 30px rgba(209, 188, 255, 0.4); }
        }

        .glassmorphic-3d-btn {
            background: linear-gradient(180deg, rgba(112, 0, 255, 0.5) 0%, rgba(40, 10, 100, 0.8) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glassmorphic-3d-btn:active {
            transform: scale(0.96) translateY(2px);
        }

        @keyframes sweep {
            0% { transform: translateX(-100%) skewX(-20deg); }
            100% { transform: translateX(200%) skewX(-20deg); }
        }
        .shimmer {
            position: absolute;
            top: 0; left: 0; width: 40%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: sweep 4s infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#050505",
                        "primary": "#d1bcff",
                        "secondary-fixed": "#ffe16d",
                        "primary-container": "#7000ff",
                        "on-surface": "#e2e2e2",
                        "surface-container-low": "#1a1c1c",
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Sora"],
                        "label-md": ["JetBrains Mono"],
                        "headline-xl": ["Sora"],
                        "headline-lg": ["Sora"],
                        "body-md": ["Inter"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container selection:text-white">
<div class="studio-floor"></div>
<!-- Header -->
<header class="fixed top-0 w-full bg-black/40 backdrop-blur-2xl border-b border-primary/20 shadow-2xl flex justify-between items-center px-6 h-16 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border-2 border-primary/50 overflow-hidden shadow-lg shadow-primary/20 relative">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFubWghd4kVyo2OnQlQNzsO8zW4wJC_h-mTnjWB13JGgEh7A4-cW-c6VD133_3fHYtIZBb89_7R7g-DBxtfA-57-RkDsijrlgsicSrVdP4t38kFXo158s5uT6CYD6mZIc_2sIfF67cD0Rzt09QWc9UhyS5HcZdUZCVuw1N1Ww0f82hRRmytWAnrjd-ZiaZMGWxNoKpXaeFJIkPWgGtWe9VdBCC4tAexceV4RpQW_pL6iwPhoAPuG7LdiJl9OpW9btMmtSi9t_fgcRE"/>
<div class="shimmer"></div>
</div>
<h1 class="font-headline-lg-mobile text-lg text-primary tracking-[0.2em] italic uppercase drop-shadow-[0_0_10px_rgba(209,188,255,0.4)]">RADIANCE ARENA</h1>
</div>
<div class="bg-primary-container/20 px-4 py-1.5 rounded-full border border-primary/40 flex items-center gap-2 active-prize-glow">
<span class="material-symbols-outlined text-secondary-fixed text-lg" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-md text-sm text-primary font-bold tracking-wider">$25,000</span>
</div>
</header>
<main class="pt-24 pb-32 px-5 max-w-4xl mx-auto relative z-10">
<!-- Header & Clock -->
<div class="text-center mb-10 relative">
<h2 class="font-headline-lg text-2xl text-primary/70 uppercase tracking-[0.4em] mb-8 drop-shadow-xl font-extrabold">FASTEST FINGER FIRST</h2>
<div class="premium-clock inline-flex items-center gap-4 px-12 py-4 rounded-xl relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-t from-yellow-500/10 to-transparent"></div>
<span class="material-symbols-outlined text-secondary-fixed text-3xl">schedule</span>
<span class="font-label-md text-4xl text-secondary-fixed tracking-widest font-black" id="timer">00:08:45</span>
</div>
</div>
<!-- Question Section -->
<div class="relative mb-16">
<div class="kbc-hexagon-border p-1 group">
<div class="kbc-hexagon py-12 px-10 md:px-20 text-center relative overflow-hidden active-prize-glow">
<div class="kbc-texture"></div>
<div class="kbc-hexagon-inner-glow"></div>
<h3 class="font-headline-lg text-xl md:text-2xl text-on-surface leading-snug relative z-10 font-bold tracking-wide">
                    Arrange these historical events from earliest to latest:
                </h3>
</div>
</div>
<!-- Floor Highlight -->
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-full h-1 bg-primary blur-3xl opacity-20"></div>
</div>
<!-- Elongated Hexagon Option Cards -->
<div class="grid grid-cols-1 gap-x-10 mb-16 gap-y-10" id="sortable-container">
<!-- Card A -->
<div class="answer-card group relative cursor-pointer" onclick="toggleSelection(this)">
<div class="kbc-hexagon-border">
<div class="kbc-hexagon py-5 px-8 flex items-center justify-start gap-4 transition-all duration-300">
<div class="kbc-texture"></div>
<div class="kbc-hexagon-inner-glow"></div>
<span class="font-headline-lg text-secondary-fixed text-xl font-black italic relative z-10 min-w-[30px]">A:</span>
<p class="font-body-md text-lg text-on-surface font-semibold tracking-wide text-center flex-grow relative z-10">The French Revolution</p>
</div>
</div>
</div>
<!-- Card B -->
<div class="answer-card group relative cursor-pointer" onclick="toggleSelection(this)">
<div class="kbc-hexagon-border">
<div class="kbc-hexagon py-5 px-8 flex items-center justify-start gap-4 transition-all duration-300">
<div class="kbc-texture"></div>
<div class="kbc-hexagon-inner-glow"></div>
<span class="font-headline-lg text-secondary-fixed text-xl font-black italic relative z-10 min-w-[30px]">B:</span>
<p class="font-body-md text-lg text-on-surface font-semibold tracking-wide text-center flex-grow relative z-10">Moon Landing (Apollo 11)</p>
</div>
</div>
</div>
<!-- Card C -->
<div class="answer-card group relative cursor-pointer" onclick="toggleSelection(this)">
<div class="kbc-hexagon-border">
<div class="kbc-hexagon py-5 px-8 flex items-center justify-start gap-4 transition-all duration-300">
<div class="kbc-texture"></div>
<div class="kbc-hexagon-inner-glow"></div>
<span class="font-headline-lg text-secondary-fixed text-xl font-black italic relative z-10 min-w-[30px]">C:</span>
<p class="font-body-md text-lg text-on-surface font-semibold tracking-wide text-center flex-grow relative z-10">Magna Carta Signing</p>
</div>
</div>
</div>
<!-- Card D -->
<div class="answer-card group relative cursor-pointer" onclick="toggleSelection(this)">
<div class="kbc-hexagon-border">
<div class="kbc-hexagon py-5 px-8 flex items-center justify-start gap-4 transition-all duration-300">
<div class="kbc-texture"></div>
<div class="kbc-hexagon-inner-glow"></div>
<span class="font-headline-lg text-secondary-fixed text-xl font-black italic relative z-10 min-w-[30px]">D:</span>
<p class="font-body-md text-lg text-on-surface font-semibold tracking-wide text-center flex-grow relative z-10">Industrial Revolution Begins</p>
</div>
</div>
</div>
</div>
<!-- Submission Area -->
<div class="flex flex-col items-center gap-10">
<button class="glassmorphic-3d-btn text-white w-full max-w-xs py-5 rounded-2xl font-headline-lg text-2xl uppercase tracking-[0.3em] font-black border-2 border-white/30 hover:shadow-[0_0_40px_rgba(112,0,255,0.4)]">
            SUBMIT
        </button>
<!-- Live Ticker -->
<div class="flex items-center gap-3 text-primary/60 bg-white/5 px-8 py-3 rounded-full border border-primary/10 backdrop-blur-md">
<span class="relative flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary-fixed opacity-75"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-secondary-fixed"></span>
</span>
<span class="font-label-md text-xs uppercase tracking-[0.15em] font-bold">12,405 competitors live</span>
</div>
</div>
</main>
<!-- Navigation Overlay (Mobile Bottom) -->
<footer class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 bg-black/60 backdrop-blur-3xl border-t border-white/5">
<button class="flex flex-col items-center justify-center text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">home</span>
<span class="text-[9px] uppercase font-bold mt-1">Lobby</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[9px] uppercase font-bold mt-1">Ranks</span>
</button>
<div class="relative -mt-12 group">
<div class="w-16 h-16 bg-gradient-to-b from-primary-container to-blue-900 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(112,0,255,0.6)] border-4 border-background transition-transform group-active:scale-90 relative overflow-hidden">
<div class="shimmer"></div>
<span class="material-symbols-outlined text-white text-3xl">rocket_launch</span>
</div>
</div>
<button class="flex flex-col items-center justify-center text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[9px] uppercase font-bold mt-1">Wallet</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">person</span>
<span class="text-[9px] uppercase font-bold mt-1">Agent</span>
</button>
</footer>
<script>
    function toggleSelection(el) {
        // Toggle selected state on the parent card
        el.classList.toggle('selected-card');
        
        // Visual feedback for interaction
        el.style.transform = 'scale(0.98)';
        setTimeout(() => {
            el.style.transform = '';
        }, 100);
    }

    let time = 525;
    const timerDisplay = document.getElementById('timer');
    
    setInterval(() => {
        if (time > 0) {
            time--;
            const mins = Math.floor(time / 60);
            const secs = time % 60;
            timerDisplay.textContent = `00:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
    }, 1000);
</script>
</body></html>
